name: Build LineageOS Go 15.1 for SM-T331 (millet3g) Minimal Style

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên server mới nhất của GitHub để lấy hiệu năng CPU cao nhất
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 10240
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Run Build in Minimal Debian Container
      uses: docker://debian:buster-slim # Sử dụng bản Debian Slim siêu nhẹ (giống cốt lõi của DietPi)
      env:
        GITHUB_WORKSPACE: /github/workspace
      with:
        args: |
          bash -c "
          # 1. Cập nhật hệ thống tối giản
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y sudo curl git openjdk-8-jdk

          # 2. Cài đặt các công cụ biên dịch cần thiết cho Android
          DEBIAN_FRONTEND=noninteractive apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

          # 3. Cài đặt mã nguồn và công cụ Repo
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          ln -sf ~/bin/repo /usr/bin/repo

          # Cấu hình Git
          git config --global user.name 'DietPiBuilder'
          git config --global user.email 'dietpi@builder.local'

          # 4. Khởi tạo mã nguồn LineageOS 15.1
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --git-lfs --depth=1

          # 5. Tải các nhánh cây mã nguồn (Trees) cho millet3g
          git clone https://github.com/LineageOS/android_device_samsung_millet3g.git -b lineage-15.1 device/samsung/millet3g
          git clone https://github.com/LineageOS/android_kernel_samsung_msm8226.git -b lineage-15.1 kernel/samsung/msm8226
          git clone https://github.com/TheMuppets/proprietary_vendor_samsung.git -b lineage-15.1 vendor/samsung

          # 6. Tùy chỉnh hệ thống (Navbar ảo)
          echo 'qemu.hw.mainkeys=0' >> device/samsung/millet3g/system.prop

          # 7. Thay thế hình nền từ file Wallpaper.png trong repo của bạn
          if [ -f '$GITHUB_WORKSPACE/Wallpaper.png' ]; then
            echo 'Đang chèn hình nền tùy chỉnh vào hệ thống...'
            cp -f $GITHUB_WORKSPACE/Wallpaper.png frameworks/base/core/res/res/drawable-nodpi/default_wallpaper.png
            cp -f $GITHUB_WORKSPACE/Wallpaper.png frameworks/base/core/res/res/drawable-sw600dp-nodpi/default_wallpaper.png
            cp -f $GITHUB_WORKSPACE/Wallpaper.png frameworks/base/core/res/res/drawable-sw720dp-nodpi/default_wallpaper.png
          fi

          # 8. Ép cấu hình Android Go (Low RAM) tiết kiệm bộ nhớ
          echo 'PRODUCT_MINIMIZE_JAVA_DEBUG_INFO := true' >> device/samsung/millet3g/lineage_millet3g.mk
          echo '\$(call inherit-product, build/make/target/product/go_defaults.mk)' >> device/samsung/millet3g/lineage_millet3g.mk

          # 9. Đồng bộ hóa toàn bộ mã nguồn
          repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags

          # 10. Tiến hành Build ROM
          export CCACHE_EXEC=/usr/bin/ccache
          export USE_CCACHE=1
          ccache -M 50G
          source build/envsetup.sh
          lunch lineage_millet3g-userdebug
          mka bacon -j\$(nproc --all)

          # Copy file ROM đầu ra để chuẩn bị gom về GitHub Artifacts
          cp ~/android/lineage/out/target/product/millet3g/lineage-*.zip $GITHUB_WORKSPACE/
          "

    - name: Upload ROM to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS_Go_15.1_SM-T331_DietPiStyle
        path: lineage-*.zip
