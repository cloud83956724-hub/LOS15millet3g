name: Build LineageOS Go 15.1 for SM-T331 (millet3g) Minimal Style

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 10240
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Run Build in Debian Bullseye Container
      uses: docker://debian:bullseye-slim
      env:
        GITHUB_WORKSPACE: /github/workspace
      with:
        args: |
          bash -c "
          # 1. Cập nhật hệ thống và cài đặt các gói công cụ cơ bản
          apt-get update && sleep 3
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl git python3 sudo gnupg wget software-properties-common procps

          # Tạo liên kết python để lệnh repo chạy không lỗi
          ln -sf /usr/bin/python3 /usr/bin/python

          # 2. Thêm kho lưu trữ và cài đặt OpenJDK 8
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | apt-key add -
          echo 'deb https://packages.adoptium.net/artifactory/deb bullseye main' | tee /etc/apt/sources.list.getadoptium.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y temurin-8-jdk

          # Ghi đè biến môi trường cố định vào hệ thống
          cat << 'EOF' >> ~/.bashrc
          export JAVA_HOME=/usr/lib/jvm/temurin-8-jdk-amd64
          export PATH=/usr/lib/jvm/temurin-8-jdk-amd64/bin:$PATH
          export CCACHE_EXEC=/usr/bin/ccache
          export USE_CCACHE=1
          EOF
          . ~/.bashrc

          # 3. Cài đặt các thư viện thiết yếu để build ROM
          DEBIAN_FRONTEND=noninteractive apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

          # 4. Cài đặt Repo Tool từ Google và sửa lỗi phân quyền Git
          mkdir -p /github/workspace/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > /github/workspace/bin/repo
          chmod a+x /github/workspace/bin/repo
          ln -sf /github/workspace/bin/repo /usr/bin/repo

          # Cấu hình danh tính Git và bỏ qua kiểm tra quyền sở hữu thư mục
          git config --global user.name 'DietPiBuilder'
          git config --global user.email 'dietpi@builder.local'
          git config --global --add safe.directory '*'

          # 5. Khởi tạo file manifest tạm ở ngoài để tránh lỗi đồng bộ ổ đĩa Docker
          cat << 'EOF' > /github/workspace/millet3g.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project path="device/samsung/millet3g" name="LineageOS/android_device_samsung_millet3g" remote="github" revision="lineage-15.1" />
            <project path="kernel/samsung/msm8226" name="msm8226-dev/android_kernel_samsung_msm8226" remote="github" revision="lineage-15.1" />
            <project path="vendor/samsung" name="TheMuppets/proprietary_vendor_samsung" remote="github" revision="lineage-15.1" />
          </manifest>
          EOF

          # 6. Khởi tạo thư mục chứa mã nguồn LineageOS
          mkdir -p /github/workspace/android/lineage
          cd /github/workspace/android/lineage
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --git-lfs --depth=1

          # 7. Di chuyển file cấu hình vào đúng vị trí sau khi repo init đã mở thư mục ẩn
          mkdir -p /github/workspace/android/lineage/.repo/local_manifests
          cp -f /github/workspace/millet3g.xml /github/workspace/android/lineage/.repo/local_manifests/millet3g.xml

          # 8. Tiến hành đồng bộ hóa dữ liệu toàn bộ kho mã nguồn
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc --all)

          # 9. Thay đổi hệ thống: Kích hoạt phím điều hướng ảo màn hình (Navbar)
          echo 'qemu.hw.mainkeys=0' >> /github/workspace/android/lineage/device/samsung/millet3g/system.prop

          # 10. Thay đổi hệ thống: Chèn hình nền Wallpaper.png cá nhân nếu bạn đã upload
          if [ -f '/github/workspace/Wallpaper.png' ]; then
            echo 'Đang thay thế hình nền mặc định...'
            cp -f /github/workspace/Wallpaper.png /github/workspace/android/lineage/frameworks/base/core/res/res/drawable-nodpi/default_wallpaper.png
            cp -f /github/workspace/Wallpaper.png /github/workspace/android/lineage/frameworks/base/core/res/res/drawable-sw600dp-nodpi/default_wallpaper.png
            cp -f /github/workspace/Wallpaper.png /github/workspace/android/lineage/frameworks/base/core/res/res/drawable-sw720dp-nodpi/default_wallpaper.png
          fi

          # 11. Thay đổi hệ thống: Cấu hình đưa về bản Android Go mượt nhẹ
          echo 'PRODUCT_MINIMIZE_JAVA_DEBUG_INFO := true' >> /github/workspace/android/lineage/device/samsung/millet3g/lineage_millet3g.mk
          echo 'include build/make/target/product/go_defaults.mk' >> /github/workspace/android/lineage/device/samsung/millet3g/lineage_millet3g.mk

          # 12. Tiến hành biên dịch hệ điều hành (Build ROM)
          . ~/.bashrc
          ccache -M 50G
          source build/envsetup.sh
          lunch lineage_millet3g-userdebug
          mka bacon -j$(nproc --all)

          # Sao chép file sản phẩm .zip ra ngoài để lưu trữ
          cp out/target/product/millet3g/lineage-*.zip /github/workspace/
          "

    - name: Upload ROM to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS_Go_15.1_SM-T331_DietPiStyle
        path: lineage-*.zip